<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatBotHub</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <header class="header">
      <div class="header-top">
        <div class="header-title">
          <span class="logo" aria-label="ChatBotHub"></span>
          <div class="header-text">
            <h1>ChatBotHub</h1>
            <p class="subtitle">多模型聊天聚合</p>
          </div>
        </div>

        <div class="header-actions">
          <button class="icon-btn icon-only toggle-btn" id="sidebarToggleBtn" title="侧边栏开关" aria-pressed="false">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="16" rx="2"></rect>
              <line x1="9" y1="4" x2="9" y2="20"></line>
              <circle cx="6" cy="12" r="1.4" fill="currentColor" stroke="none"></circle>
            </svg>
          </button>
          <button class="icon-btn icon-only" id="themeToggleBtn" title="切换主题">
            <svg id="themeIconSun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg id="themeIconMoon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>
          <button class="icon-btn icon-only" id="addModelBtn" title="添加模型">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
          <button class="icon-btn icon-only" id="manageGroupsBtn" title="管理分组">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- 搜索卡片 -->
    <div class="panel search-panel">
      <div class="search-box">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="searchInput" placeholder="搜索模型..." />
        <kbd>⌘K</kbd>
      </div>
    </div>

    <!-- 模型列表 -->
    <div class="panel list-panel">
      <div class="models-container" id="modelsContainer">
        <!-- 分组和模型将通过 JS 动态生成 -->
      </div>
    </div>
  </div>

  <!-- 添加模型弹窗 -->
  <div class="modal-overlay" id="addModelModal">
    <div class="modal">
      <div class="modal-header">
        <h2>添加自定义模型</h2>
        <button class="modal-close" id="closeAddModal">&times;</button>
      </div>
      <div class="modal-body">
        <form id="addModelForm">
          <div class="form-group">
            <label for="modelName">模型名称 *</label>
            <input type="text" id="modelName" name="name" required placeholder="请输入模型名称" />
          </div>

          <div class="form-group">
            <label for="modelUrl">模型地址 *</label>
            <input type="url" id="modelUrl" name="url" required placeholder="请输入链接地址" />
          </div>

          <div class="form-group">
            <label for="modelDescription">模型描述</label>
            <input type="text" id="modelDescription" name="description" placeholder="例如：我的自定义 AI 助手" />
          </div>

          <div class="form-group">
            <label for="modelGroup">分组</label>
            <select id="modelGroup" name="groupId">
              <option value="default">默认分组</option>
              <option value="chinese">国内模型</option>
              <option value="international">国际模型</option>
            </select>
          </div>

          <div class="form-group">
            <label for="modelIcon">图标</label>
            <div class="icon-upload">
              <input type="file" id="modelIcon" name="icon" accept="image/*" />
              <div class="icon-preview" id="iconPreview">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                  <circle cx="8.5" cy="8.5" r="1.5"></circle>
                  <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
                <span>点击上传图标</span>
              </div>
              <img id="iconPreviewImg" class="icon-preview-img" style="display: none;" />
              <button type="button" class="btn-remove" id="removeIcon" style="display: none;">×</button>
            </div>
          </div>

          <div class="form-group">
            <label for="modelColor">颜色</label>
            <div class="color-picker">
              <input type="color" id="modelColor" name="color" value="#3b82f6" />
              <span class="color-value">#3b82f6</span>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="cancelAddBtn">取消</button>
        <button type="button" class="btn btn-primary" id="saveModelBtn">保存</button>
      </div>
    </div>
  </div>

  <!-- 管理分组弹窗 -->
  <div class="modal-overlay" id="manageGroupsModal">
    <div class="modal">
      <div class="modal-header">
        <h2>管理分组</h2>
        <button class="modal-close" id="closeGroupsModal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="groups-list" id="groupsList">
          <!-- 分组列表通过 JS 生成 -->
        </div>
        <div class="add-group-form">
          <input type="text" id="newGroupName" placeholder="新分组名称" />
          <button class="btn btn-primary" id="addGroupBtn">添加分组</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div class="toast" id="toast"></div>

  <script src="storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
